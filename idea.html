<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Idea | Squabbit</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="assets/icon_transparent.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="/css/ideas.css" rel="stylesheet" />
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="ideas-page">
        <div class="ideas-container">
            <a class="idea-detail-back" href="/ideas.html"><i class="bi bi-arrow-left"></i> All ideas</a>

            <div class="idea-detail" id="detail-root">
                <div class="ideas-skeleton" style="margin-top: 1.5rem;">
                    <div class="ideas-skeleton-card" style="height: 240px;"></div>
                    <div class="ideas-skeleton-card" style="height: 60px;"></div>
                    <div class="ideas-skeleton-card" style="height: 60px;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div class="lightbox" id="lightbox"><img id="lightbox-img" alt="" /></div>
    <div class="ideas-toast" id="ideas-toast"></div>

    <script>
        fetch('/header.html').then(r => r.text()).then(html => {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            const nav = tmp.querySelector('#mainNav');
            if (nav) document.getElementById('header-placeholder').replaceWith(nav);
        });
        fetch('/footer.html').then(r => r.text()).then(html => {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            const footer = tmp.querySelector('footer');
            if (footer) document.getElementById('footer-placeholder').replaceWith(footer);
        });
    </script>
    <script type="module" src="/js/idea.js"></script>
</body>
</html>
