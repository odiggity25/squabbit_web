<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Squabbit Admin</title>
    <link rel="icon" type="image/x-icon" href="assets/icon_transparent.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .admin-container { max-width: 600px; margin: 60px auto; }
        .card { border-radius: 12px; }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand img { width: 48px; height: 48px; margin-right: 8px; vertical-align: middle; }
        #admin-tools { display: none; }
        #login-section { display: none; }
        #loading { text-align: center; padding: 40px; }
        .alert { word-break: break-word; }
        .showcase-item, .ad-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .showcase-item:last-child, .ad-item:last-child { border-bottom: none; }
        .showcase-item img, .ad-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; }
        .showcase-item-info, .ad-item-info { flex: 1; min-width: 0; }
        .showcase-item-info h6, .ad-item-info h6 { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .showcase-item-info small, .ad-item-info small { color: #6c757d; }
        .showcase-item-actions, .ad-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        #showcase-form-section, #ad-form-section { display: none; }
        #showcase-image-preview, #ad-image-preview { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 8px; display: none; }
        .url-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .url-row select { width: 130px; flex-shrink: 0; }
        .url-row input { flex: 1; }
    </style>
</head>
<body>
    <div class="admin-container px-3">
        <div class="brand">
            <h4><img src="assets/icon_transparent.png" alt="Squabbit">Squabbit Admin</h4>
        </div>

        <div id="loading">
            <div class="spinner-border text-secondary" role="status"></div>
            <p class="mt-2 text-muted">Loading...</p>
        </div>

        <div id="login-section">
            <div class="card shadow-sm p-4">
                <h5 class="mb-3">Sign In</h5>
                <div id="login-error" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="login-email" />
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="login-password" />
                </div>
                <button class="btn btn-primary w-100" id="login-btn">Sign In</button>
            </div>
        </div>

        <div id="admin-tools">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted" id="signed-in-as"></span>
                <button class="btn btn-outline-secondary btn-sm" id="sign-out-btn">Sign Out</button>
            </div>

            <div class="card shadow-sm p-4">
                <h5 class="mb-3">Reset User Credentials</h5>
                <p class="text-muted small">Enter the user's email to disconnect their login so they can re-register.</p>
                <div id="reset-result" class="alert d-none"></div>
                <div class="mb-3">
                    <label for="reset-email" class="form-label">User Email</label>
                    <input type="email" class="form-control" id="reset-email" />
                </div>
                <button class="btn btn-danger w-100" id="reset-btn">Reset Credentials</button>
            </div>

            <div class="card shadow-sm p-4 mt-4">
                <div id="showcase-list-section">
                    <h5 class="mb-3">Showcase Items</h5>
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-primary btn-sm" id="add-showcase-btn">+ Add Item</button>
                        <select class="form-select form-select-sm" id="from-blog-select" style="width: auto;">
                            <option value="">From blog post...</option>
                        </select>
                    </div>
                    <div id="showcase-result" class="alert d-none"></div>
                    <div id="showcase-list">
                        <p class="text-muted small">Loading...</p>
                    </div>
                </div>

                <div id="showcase-form-section">
                    <h5 id="showcase-form-title" class="mb-3">New Showcase Item</h5>
                    <div class="mb-3">
                        <label for="showcase-title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="showcase-title" />
                    </div>
                    <div class="mb-3">
                        <label for="showcase-date" class="form-label">Date</label>
                        <input type="datetime-local" class="form-control" id="showcase-date" />
                    </div>
                    <div class="d-flex gap-4 mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="showcase-enabled" checked />
                            <label class="form-check-label" for="showcase-enabled">Enabled</label>
                        </div>
                        <div class="form-check form-switch d-flex align-items-center gap-1">
                            <input class="form-check-input" type="checkbox" id="showcase-internal-preview" />
                            <label class="form-check-label" for="showcase-internal-preview">Internal Preview</label>
                            <span title="Only visible to sysAdmin users in the app. Use this to review items before making them public." style="cursor: help; color: #6c757d;">&#9432;</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="form-label mb-0">Image</label>
                            <div class="btn-group btn-group-sm">
                                <button type="button" class="btn btn-outline-secondary active" id="image-mode-file">File</button>
                                <button type="button" class="btn btn-outline-secondary" id="image-mode-url">URL</button>
                            </div>
                        </div>
                        <input type="file" class="form-control" id="showcase-image" accept="image/*" />
                        <input type="url" class="form-control d-none" id="showcase-image-url" placeholder="https://example.com/image.jpg" />
                        <img id="showcase-image-preview" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URLs</label>
                        <div id="showcase-urls"></div>
                        <button type="button" class="btn btn-outline-secondary btn-sm mt-1" id="add-url-btn">+ Add URL</button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary flex-fill" id="save-showcase-btn">Save</button>
                        <button class="btn btn-outline-secondary" id="cancel-showcase-btn">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm p-4 mt-4">
                <div id="ad-list-section">
                    <h5 class="mb-3">Ads</h5>
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-primary btn-sm" id="add-ad-btn">+ Add Ad</button>
                    </div>
                    <div id="ad-result" class="alert d-none"></div>
                    <div id="ad-list">
                        <p class="text-muted small">Loading...</p>
                    </div>
                </div>

                <div id="ad-form-section">
                    <h5 id="ad-form-title" class="mb-3">New Ad</h5>
                    <div id="ad-form-result" class="alert d-none"></div>
                    <div class="mb-3">
                        <label for="ad-title" class="form-label">Title <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" class="form-control" id="ad-title" />
                    </div>
                    <div class="mb-3">
                        <label for="ad-body" class="form-label">Body (optional)</label>
                        <input type="text" class="form-control" id="ad-body" />
                    </div>
                    <div class="mb-3">
                        <label for="ad-url" class="form-label">Link URL</label>
                        <input type="url" class="form-control" id="ad-url" placeholder="https://..." />
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="ad-start-date" class="form-label">Start Date</label>
                            <input type="datetime-local" class="form-control" id="ad-start-date" />
                        </div>
                        <div class="col">
                            <label for="ad-end-date" class="form-label">End Date</label>
                            <input type="datetime-local" class="form-control" id="ad-end-date" />
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="ad-priority" class="form-label">Priority</label>
                            <input type="number" class="form-control" id="ad-priority" value="0" min="0" />
                        </div>
                        <div class="col">
                            <label for="ad-min-version" class="form-label">Min App Version</label>
                            <input type="number" class="form-control" id="ad-min-version" value="0" min="0" />
                        </div>
                    </div>
                    <div class="d-flex gap-4 mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="ad-active" checked />
                            <label class="form-check-label" for="ad-active">Active</label>
                        </div>
                        <div class="form-check form-switch d-flex align-items-center gap-1">
                            <input class="form-check-input" type="checkbox" id="ad-internal-preview" />
                            <label class="form-check-label" for="ad-internal-preview">Internal Preview</label>
                            <span title="Only visible to sysAdmin users in the app." style="cursor: help; color: #6c757d;">&#9432;</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <label class="form-label mb-0">Image</label>
                            <div class="btn-group btn-group-sm">
                                <button type="button" class="btn btn-outline-secondary active" id="ad-image-mode-file">File</button>
                                <button type="button" class="btn btn-outline-secondary" id="ad-image-mode-url">URL</button>
                            </div>
                        </div>
                        <input type="file" class="form-control" id="ad-image" accept="image/*" />
                        <input type="url" class="form-control d-none" id="ad-image-url" placeholder="https://example.com/image.jpg" />
                        <img id="ad-image-preview" />
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary flex-fill" id="save-ad-btn">Save</button>
                        <button class="btn btn-outline-secondary" id="cancel-ad-btn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
