name: Deploy static site to GitHub Pages

# Replaces the default (classic Jekyll) GitHub Pages build, which was failing
# with no useful diagnostics. This site is plain static files, so we upload them
# verbatim and deploy. The custom domain (CNAME) is preserved because the CNAME
# file is copied into the artifact.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (exclude VCS and workflow files)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='_site' --exclude='.github' ./ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
