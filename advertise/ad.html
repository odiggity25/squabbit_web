<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Edit Ad – Squabbit Advertiser Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/icon_transparent.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/advertise/styles.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VK78NGGL18"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-VK78NGGL18');
    </script>
</head>
<body>
    <div class="editor-container">
        <div class="editor-header">
            <a href="/advertise/portal.html" class="text-muted small">&larr; Back to portal</a>
            <button class="btn btn-outline-secondary btn-sm" id="sign-out-btn">Sign out</button>
        </div>

        <div id="loading">
            <div class="spinner-border text-secondary" role="status"></div>
            <p class="mt-2 text-muted">Loading...</p>
        </div>

        <div id="signed-out-view" style="display:none">
            <div class="card shadow-sm p-4 portal-card">
                <h5 class="mb-3">Sign in required</h5>
                <p class="text-muted">Please <a href="/advertise/portal.html">sign in</a> to manage ads.</p>
            </div>
        </div>

        <div id="not-authorized-view" style="display:none">
            <div class="card shadow-sm p-4 portal-card">
                <h5 class="mb-3">Not your ad</h5>
                <p class="text-muted">This ad is owned by someone else. <a href="/advertise/portal.html">Back to portal</a>.</p>
            </div>
        </div>

        <div id="editor-view" style="display:none">
            <div id="status-banner" class="status-banner" style="display:none"></div>

            <div class="editor-grid">
                <div class="editor-form">
                    <h4 id="editor-title">New ad</h4>
                    <div id="ad-result" class="alert d-none"></div>

                    <div class="mb-3">
                        <label for="ad-title" class="form-label">Headline</label>
                        <input type="text" class="form-control" id="ad-title" maxlength="60" />
                        <div class="form-text">Up to 60 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="ad-body" class="form-label">Body</label>
                        <textarea class="form-control" id="ad-body" rows="3" maxlength="200"></textarea>
                        <div class="form-text">Up to 200 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="ad-url" class="form-label">Click-through URL</label>
                        <input type="url" class="form-control" id="ad-url" placeholder="https://" />
                        <div class="form-text">Where users land when they tap your ad.</div>
                    </div>
                    <div class="mb-3">
                        <label for="ad-image" class="form-label">Image</label>
                        <input type="file" class="form-control" id="ad-image" accept="image/*" />
                        <img id="ad-image-preview" alt="" style="display:none" />
                    </div>
                    <div class="mb-3">
                        <label for="ad-video" class="form-label">Video <span class="text-muted small">(optional, &lt;10 MB)</span></label>
                        <input type="file" class="form-control" id="ad-video" accept="video/*" />
                        <div class="d-flex align-items-center gap-2 mt-1">
                            <span id="ad-video-status" class="text-muted small"></span>
                            <button type="button" class="btn btn-link btn-sm p-0 d-none" id="ad-video-remove">Remove</button>
                        </div>
                    </div>

                    <div class="editor-actions">
                        <button class="btn btn-outline-secondary" id="save-draft-btn">Save draft</button>
                        <button class="btn btn-primary" id="submit-btn">Submit for review</button>
                        <button class="btn btn-outline-danger ms-auto" id="delete-btn">Delete</button>
                    </div>
                </div>

                <div class="editor-preview">
                    <div id="ad-preview-card"></div>
                    <div id="stats-panel" class="stats-panel" style="display:none">
                        <h6 class="stats-title">Performance</h6>
                        <div class="stats-grid">
                            <div class="stat-tile"><div class="stat-value" id="stat-impressions">0</div><div class="stat-label">Views</div></div>
                            <div class="stat-tile"><div class="stat-value" id="stat-unique">0</div><div class="stat-label">Unique</div></div>
                            <div class="stat-tile"><div class="stat-value" id="stat-clicks">0</div><div class="stat-label">Clicks</div></div>
                            <div class="stat-tile stat-tile-feature"><div class="stat-value" id="stat-ctr">—</div><div class="stat-label">CTR</div></div>
                            <div class="stat-tile"><div class="stat-value" id="stat-dismissals">0</div><div class="stat-label">Not interested</div></div>
                        </div>
                        <button class="btn btn-link btn-sm p-0" id="refresh-stats-btn">Refresh</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/advertise/ad.js"></script>
</body>
</html>
