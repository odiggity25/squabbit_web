<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Squabbit Admin — AI Chats</title>
    <link rel="icon" type="image/x-icon" href="assets/icon_transparent.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .admin-container { max-width: 1000px; margin: 40px auto; }
        .card { border-radius: 12px; }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand img { width: 48px; height: 48px; margin-right: 8px; vertical-align: middle; }
        #admin-content { display: none; }
        #login-section { display: none; }
        #loading { text-align: center; padding: 40px; }
        .alert { word-break: break-word; }
        table.chats-table td, table.chats-table th { vertical-align: middle; }
        table.chats-table tbody tr { cursor: pointer; }
        .chat-bubble { border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
        .chat-bubble.user { background: #1E7A4A; color: #fff; margin-left: auto; }
        .chat-bubble.assistant { background: #fff; border: 1px solid #e6e8eb; color: #1a1a1a; margin-right: auto; }
        .chat-role { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin-bottom: 4px; }
        .chat-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .chat-bubble.user .chat-meta { color: rgba(255,255,255,.75); }
        .actions-block { margin-top: 8px; border-top: 1px dashed #d7dbe0; padding-top: 8px; }
        .actions-block pre { background: #f6f8fa; border-radius: 8px; padding: 8px 10px; font-size: 12px; margin: 6px 0 0 0; white-space: pre-wrap; word-break: break-word; }
        .status-chip { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; border-radius: 999px; padding: 3px 9px; }
        .status-chip.applied { color: #1E7A4A; background: rgba(30, 122, 74, .12); }
        .status-chip.declined, .status-chip.failed { color: #b91c1c; background: rgba(185, 28, 28, .12); }
        .status-chip.pending, .status-chip.none { color: #64748b; background: #f1f5f9; }
        .feedback-icon { font-size: 15px; margin-left: 8px; }
        .header-fact { font-size: 13px; }
        .header-fact .label { color: #64748b; margin-right: 4px; }
        .links-block a { font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="admin-container px-3">
        <div class="brand">
            <h4><img src="assets/icon_transparent.png" alt="Squabbit">Squabbit Admin — AI Chats</h4>
        </div>

        <div id="loading">
            <div class="spinner-border text-secondary" role="status"></div>
            <p class="mt-2 text-muted">Loading...</p>
        </div>

        <div id="login-section">
            <div class="card shadow-sm p-4" style="max-width: 480px; margin: 0 auto;">
                <h5 class="mb-3">Sign In</h5>
                <div id="login-error" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="login-email" />
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="login-password" />
                </div>
                <button class="btn btn-primary w-100" id="login-btn">Sign In</button>
            </div>
        </div>

        <div id="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a href="admin.html" class="text-decoration-none">&larr; Back to Admin</a>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted" id="signed-in-as"></span>
                    <button class="btn btn-outline-secondary btn-sm" id="sign-out-btn">Sign Out</button>
                </div>
            </div>

            <!-- LIST VIEW -->
            <div id="list-view" class="d-none">
                <div class="card shadow-sm p-4">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                        <h5 class="mb-0">AI Chat Conversations</h5>
                        <input type="text" class="form-control form-control-sm" id="chat-search" placeholder="Filter by title or group id..." style="max-width: 320px;" />
                    </div>
                    <div id="list-result" class="alert d-none"></div>
                    <div class="table-responsive">
                        <table class="table table-hover chats-table align-middle">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Group type</th>
                                    <th>Group id</th>
                                    <th class="text-end">#Msgs</th>
                                    <th class="text-end">Proposed</th>
                                    <th class="text-end">Applied</th>
                                    <th>Updated</th>
                                </tr>
                            </thead>
                            <tbody id="chats-tbody">
                                <tr><td colspan="7" class="text-muted small">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- DETAIL VIEW -->
            <div id="detail-view" class="d-none">
                <div class="mb-3">
                    <a href="adminAiChats.html" class="text-decoration-none">&larr; Back to list</a>
                </div>
                <div id="detail-result" class="alert d-none"></div>
                <div class="card shadow-sm p-4 mb-3" id="detail-header"></div>
                <div id="detail-transcript"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="adminAiChats.js"></script>
</body>
</html>
