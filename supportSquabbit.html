<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Squabbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div class="container px-5" style="padding-top: 8rem; padding-bottom: 4rem; max-width: 600px;">
    <div class="text-center mb-4">
        <img src="/assets/icon_transparent.png" alt="Squabbit logo" width="80" height="80">
    </div>

    <h1 class="fw-bold text-center mb-3">Chip In ❤️</h1>

    <p class="text-muted mb-1">
        If you're enjoying the app and want to help cover some of our server costs, any contribution goes a long way.
    </p>
    <p class="text-muted mb-4">
        Thank you so much!
    </p>
    <p class="text-muted fst-italic mb-4">— The Squabbit Team</p>

    <div id="success-banner" class="alert alert-success text-center" style="display: none;">
        Thank you so much for your support! It means the world. ❤️
    </div>

    <div id="donate-form">
        <div class="btn-group w-100 mb-2" role="group">
            <input type="radio" class="btn-check" name="frequency" id="freq-once" value="once" checked onchange="updateFrequencyNote()">
            <label class="btn btn-outline-primary rounded-start-pill" for="freq-once">One-time</label>
            <input type="radio" class="btn-check" name="frequency" id="freq-monthly" value="monthly" onchange="updateFrequencyNote()">
            <label class="btn btn-outline-primary rounded-end-pill" for="freq-monthly">Monthly</label>
        </div>
        <p id="monthly-note" class="text-muted small mb-3" style="display: none;">Renews monthly. Cancel anytime from your Stripe receipt email.</p>
        <div class="mb-3">
            <label for="amount" class="form-label fw-semibold">Amount (USD)</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="amount" min="1" step="1" placeholder="10" onkeydown="if(event.key==='Enter') startDonation()">
            </div>
        </div>
        <div class="d-grid">
            <button id="donate-btn" class="btn btn-primary btn-lg rounded-pill" onclick="startDonation()">
                Chip In ❤️
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function startDonation() {
        const amount = document.getElementById('amount').value;
        if (!amount || parseFloat(amount) < 1) {
            alert('Please enter an amount of at least $1.');
            return;
        }

        const monthly = document.getElementById('freq-monthly').checked;
        const endpoint = monthly ? 'donation-subscription' : 'donation-session';

        const btn = document.getElementById('donate-btn');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        try {
            const response = await fetch(
                `https://squabbit-stripe-backend-05d905886df0.herokuapp.com/api/stripe/${endpoint}?amount=${encodeURIComponent(amount)}`,
                { method: 'GET' }
            );
            const { sessionUrl } = await response.json();
            window.location.href = sessionUrl;
        } catch (err) {
            alert('Something went wrong. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Chip In ❤️';
        }
    }

    function updateFrequencyNote() {
        const monthly = document.getElementById('freq-monthly').checked;
        document.getElementById('monthly-note').style.display = monthly ? 'block' : 'none';
    }

    if (new URLSearchParams(window.location.search).get('success') === 'true') {
        document.getElementById('success-banner').style.display = 'block';
        document.getElementById('donate-form').style.display = 'none';
    }
</script>
<script>
    fetch('/header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
