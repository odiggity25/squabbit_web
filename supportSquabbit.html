<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Squabbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<div class="container px-5" style="padding-top: 8rem; padding-bottom: 4rem; max-width: 600px;">
    <div class="text-center mb-4">
        <img src="/assets/icon_transparent.png" alt="Squabbit logo" width="80" height="80">
    </div>

    <h1 class="fw-bold text-center mb-3">Support Squabbit</h1>

    <p class="text-muted text-center mb-4">
        Squabbit is free and always will be. If you'd like to support the project and help keep the servers running, any amount is hugely appreciated.
    </p>

    <div id="success-banner" class="alert alert-success text-center" style="display: none;">
        Thank you so much for your support! It means the world. ❤️
    </div>

    <div id="donate-form">
        <div class="mb-3">
            <label for="amount" class="form-label fw-semibold">Donation amount (USD)</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="amount" min="1" step="1" placeholder="10" onkeydown="if(event.key==='Enter') startDonation()">
            </div>
        </div>
        <div class="d-grid">
            <button id="donate-btn" class="btn btn-primary btn-lg rounded-pill" onclick="startDonation()">
                Support Squabbit ❤️
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function startDonation() {
        const amount = document.getElementById('amount').value;
        if (!amount || parseFloat(amount) < 1) {
            alert('Please enter an amount of at least $1.');
            return;
        }

        const btn = document.getElementById('donate-btn');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        try {
            const response = await fetch(
                `https://squabbit-stripe-backend-05d905886df0.herokuapp.com/api/stripe/donation-session?amount=${encodeURIComponent(amount)}`,
                { method: 'GET' }
            );
            const { sessionId, stripePublicKey } = await response.json();
            window.location.href = `/stripeCheckoutLoading.html?sessionId=${sessionId}&stripePublicKey=${stripePublicKey}`;
        } catch (err) {
            alert('Something went wrong. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Support Squabbit ❤️';
        }
    }

    if (new URLSearchParams(window.location.search).get('success') === 'true') {
        document.getElementById('success-banner').style.display = 'block';
        document.getElementById('donate-form').style.display = 'none';
    }
</script>
<script>
    fetch('/header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
